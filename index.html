<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Matt Briney — Travel Passport</title>
  <meta name="description" content="An interactive virtual passport built from Matt's TripIt flight history." />
  <meta name="theme-color" content="#0a0f2c" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="assets/css/passport.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%230a0f2c'/%3E%3Cpath d='M21 11l-5 8-3-3-3 5h14z' fill='%23a78bfa'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="bg-stars" aria-hidden="true"></div>

  <main id="app" class="app">
    <header class="topbar" role="banner">
      <button class="brand" id="brand-home" aria-label="Return to passport">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path fill="currentColor" d="M2 16l8-2 2-3 4-7 2 1-3 7 1 1 5-1 1 2-6 3-2 3-5 6-2-1 3-6-1-1-5 2z"/>
        </svg>
        <span>Travel Passport</span>
      </button>
      <nav class="view-tabs" aria-label="Switch view">
        <button data-view="passport" class="is-active">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.6" d="M5 4h11l3 3v13H5z"/><path fill="none" stroke="currentColor" stroke-width="1.6" d="M8 9h8M8 12h8M8 15h5"/></svg>
          Passport
        </button>
        <button data-view="stats">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" d="M4 18V11M10 18V6M16 18v-9M22 18H2"/></svg>
          Stats
        </button>
        <button data-view="world">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path fill="none" stroke="currentColor" stroke-width="1.4" d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          World
        </button>
        <button data-view="usa">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.6" d="M3 8h4l1-2h6l1 2h6v10H3z"/><circle cx="12" cy="13" r="2" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
          USA
        </button>
        <button data-view="achievements">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" d="M7 4h10v3a5 5 0 0 1-10 0V4z"/><path fill="none" stroke="currentColor" stroke-width="1.6" d="M5 5h2v3M19 5h-2v3M9 14h6l-1 4h-4z"/></svg>
          Achievements
        </button>
        <button data-view="timeline">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" d="M12 7v5l3 2"/></svg>
          Timeline
        </button>
        <button data-view="log">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.6" d="M5 4h14v16H5z"/><path fill="none" stroke="currentColor" stroke-width="1.4" d="M8 8h8M8 12h8M8 16h5"/></svg>
          Log
        </button>
      </nav>
      <div class="user-meta">
        <span class="user-name">Matt Briney</span>
        <span class="user-updated" id="meta-updated">Updated —</span>
      </div>
    </header>

    <!-- Loading / empty state -->
    <section id="empty" class="empty hidden" aria-live="polite">
      <h1>Welcome aboard.</h1>
      <p>No flight data yet. Run the TripIt fetcher to populate this passport:</p>
      <pre><code>cd Travel
pip install -r tools/requirements.txt
python tools/build_airports.py
python tools/fetch_tripit.py</code></pre>
      <p class="muted">Then refresh.</p>
    </section>

    <!-- Views -->
    <div class="views" id="views">

      <!-- PASSPORT VIEW: the book -->
      <section id="view-passport" class="view is-active" data-view="passport">
        <div class="book-wrap" aria-label="Travel passport">
          <button class="nav-arrow nav-prev" id="prev" aria-label="Previous page" disabled>
            <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M15 5l-7 7 7 7"/></svg>
          </button>
          <div class="book" id="book"></div>
          <button class="nav-arrow nav-next" id="next" aria-label="Next page">
            <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
          <div class="page-indicator" id="indicator" aria-live="polite"></div>
        </div>
      </section>

      <!-- STATS VIEW -->
      <section id="view-stats" class="view" data-view="stats" hidden></section>

      <!-- WORLD MAP VIEW -->
      <section id="view-world" class="view" data-view="world" hidden></section>

      <!-- US STATES VIEW -->
      <section id="view-usa" class="view" data-view="usa" hidden></section>

      <!-- ACHIEVEMENTS VIEW -->
      <section id="view-achievements" class="view" data-view="achievements" hidden></section>

      <!-- TIMELINE VIEW -->
      <section id="view-timeline" class="view" data-view="timeline" hidden></section>

      <!-- FLIGHT LOG VIEW -->
      <section id="view-log" class="view" data-view="log" hidden></section>

    </div>

    <!-- Reusable detail modal (flights, stamps, achievements) -->
    <div id="detail-modal" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
        <button class="modal-close" data-close aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <div class="modal-panes">
          <div id="detail-modal-body" class="modal-body"></div>
          <div id="detail-modal-side" class="modal-side" hidden>
            <button class="modal-side-close" data-side-close aria-label="Close detail">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
            <div id="detail-modal-side-body"></div>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <span>Data: <a href="https://www.tripit.com" rel="noopener">TripIt</a> · Built with D3, vanilla JS · <a href="https://github.com/mbriney/Travel" rel="noopener">source</a></span>
    </footer>
  </main>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
