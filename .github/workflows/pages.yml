name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject build version into JS imports + script tags
        # Stamps every same-repo `import "./*.js"` and the main.js <script src=>
        # with `?v=<run-id>-<short-sha>` so browsers always fetch the latest
        # module graph on each deploy. Source files in git stay untouched —
        # this only rewrites the artifact that's uploaded to Pages.
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          BUILD_VERSION="${{ github.run_id }}-${SHORT_SHA}"
          echo "Build version: $BUILD_VERSION"
          python3 tools/cache_bust.py "$BUILD_VERSION"
          # Smoke-check: confirm the rewrite actually landed before we upload.
          if ! grep -q "main\.js?v=${BUILD_VERSION}" index.html; then
            echo "::error::cache_bust.py did not update index.html"
            exit 1
          fi
          echo "Verified: index.html has main.js?v=${BUILD_VERSION}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo — index.html is at the root.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
